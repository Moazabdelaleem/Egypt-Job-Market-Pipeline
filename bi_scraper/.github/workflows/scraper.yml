name: BI Scraper Pipeline

on:
  schedule:
    # Scrape company career pages (every 2 days — 6 AM UTC)
    - cron: '0 6 */2 * *'
  workflow_dispatch:
    inputs:
      spider:
        description: 'Which spider to run'
        required: true
        default: 'career_spider'
        type: choice
        options:
          - career_spider

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps

      - name: Run Career Spider
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          scrapy crawl career_spider

      - name: Upload CSV artifacts (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bi-jobs-${{ github.run_number }}
          path: output/*.csv
          retention-days: 60
